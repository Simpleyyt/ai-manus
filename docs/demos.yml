# Demo catalog — single source of truth for README + Docsify demo sections.
# Edit here, then run: ./update_doc.sh
#
# README inline players: only `user-attachments` bare URLs auto-embed on
# github.com. In-repo / Release MP4s use an HTML <video> tag (plus a fallback
# link). Docsify embeds MP4 via `:include`.
#
# Local recordings stay in recordings/ (gitignored). Checked-in copies live
# under docs/assets/demos/ and are also mirrored on:
#   https://github.com/Simpleyyt/ai-manus/releases/tag/demo-videos-20260718

