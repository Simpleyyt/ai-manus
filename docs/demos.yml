# After recording a new demo locally (see recordings/, gitignored):
# 1. Upload mp4s: gh release create demo-videos-YYYYMMDD recordings/*.mp4 --title "..."
# 2. Paste browser_download_url values below
# 3. Run ./update_doc.sh

