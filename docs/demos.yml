# Demo catalog — single source of truth for README + Docsify demo sections.
# Edit here, then run: ./update_doc.sh
#
# README on github.com:
#   - `user-attachments` bare URLs → native inline video player (best)
#   - otherwise: poster JPG + link to in-repo MP4 (GitHub blob page has a player)
#
# Docsify embeds the Release MP4 via `:include`.
#
# Local recordings stay in recordings/ (gitignored).

